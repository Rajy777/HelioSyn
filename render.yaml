services:
  # Python Flask Backend
  - type: web
    name: heliosyn-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.api:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 5000

  # React Frontend (Static Site)
  - type: static
    name: heliosyn-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PREDICTION_API_URL
        fromService:
          type: web
          name: heliosyn-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
